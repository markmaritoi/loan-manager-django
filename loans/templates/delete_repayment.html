{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-3 text-danger">Delete Repayment</h3>

            <p>Are you sure you want to delete this repayment?</p>

            <ul>
                <li><strong>Amount:</strong> €{{ repayment.amount }}</li>
                <li><strong>Method:</strong> {{ repayment.get_payment_method_display }}</li>
                <li><strong>Date:</strong> {{ repayment.payment_date }}</li>
            </ul>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'loan_detail' repayment.loan.id %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
